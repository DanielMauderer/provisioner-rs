# cargo-deny configuration for provisioner-rs
#
# Run locally:  cargo deny check

[graph]
all-features = true
no-default-features = false

[advisories]
version = 2
# Deny all advisories (security vulnerabilities, unsoundness).
vulnerability = "deny"
unmaintained = "warn"
unsound = "deny"
yanked = "deny"
notice = "warn"
# Ignore advisories for crates that are only used on the host (proc-macro).
ignore = []

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "BSL-1.0",
    "CC0-1.0",
    "Zlib",
    "OpenSSL",
]
# These crates are so widely used they're considered acceptable.
exceptions = [
    { name = "unicode-ident", allow = ["Unicode-DFS-2016"] },
]
copyleft = "deny"
default = "deny"
allow-osi-fsf-free = "either"

[bans]
multiple-versions = "warn"
wildcards = "deny"
deny = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-git = []
