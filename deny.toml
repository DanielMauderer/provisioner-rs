# cargo-deny configuration for provisioner-rs
#
# Run locally:  cargo deny check

[graph]
all-features = true
no-default-features = false

[advisories]
version = 2
# Deny all advisories (security vulnerabilities, unsoundness).
# cargo-deny v2 handles vulnerability/yanked/unmaintained/unsound/notice
# Ignore advisories for crates that are only used on the host (proc-macro).
ignore = [
    # RUSTSEC-2024-0436: paste (transitive dep) — unmaintained; fork available
    # but not a direct dep. Revisit if upstream crates migrate to pastey.
    "RUSTSEC-2024-0436",
]

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-3-Clause",
    "0BSD",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "BSL-1.0",
    "CC0-1.0",
    "Zlib",
    "OpenSSL",
]
# These crates are so widely used they're considered acceptable.
exceptions = [
    { name = "unicode-ident", allow = ["Unicode-DFS-2016"] },
]

[bans]
# workspace-internal path-only deps are standard practice
allow-wildcard-paths = true
multiple-versions = "warn"
wildcards = "deny"
deny = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-git = []
