# cargo-deny configuration for provisioner-rs
#
# Run locally:  cargo deny check

[graph]
all-features = true
no-default-features = false

[advisories]
version = 2
# Deny all advisories (security vulnerabilities, unsoundness).
# cargo-deny v2 handles vulnerability/yanked/unmaintained/unsound/notice
# via its default severity classification — no per-category config needed.
ignore = []

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "BSL-1.0",
    "CC0-1.0",
    "Zlib",
    "OpenSSL",
]
# These crates are so widely used they're considered acceptable.
exceptions = [
    { name = "unicode-ident", allow = ["Unicode-DFS-2016"] },
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
deny = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-git = []
